  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

9; /* @kind other */\n\n  /* derived shades (oklch-adjusted, kept in-family) */\n  --burgundy-dark: #5C050D;   /* pressed / deep accent */\n  --burgundy-light: #A32234;  /* hover tint on dark surfaces */\n  --charcoal-soft: #6E6E68;   /* secondary text on cream */\n  --charcoal-faint: #9A9A93;  /* tertiary text, placeholders */\n  --cream-dim: #EAE8D8;       /* subtle surface step-down from cream */\n  --white: #FFFFFF;\n\n  /* semantic surfaces */\n  --surface-page: var(--cream);\n  --surface-page-dim: var(--cream-dim);\n  --surface-inverse: var(--burgundy);\n  --surface-card: var(--white);\n  --surface-card-on-inverse: rgba(255, 255, 255, 0.06);\n\n  /* semantic text */\n  --text-primary: var(--charcoal);\n  --text-secondary: var(--charcoal-soft);\n  --text-tertiary: var(--charcoal-faint);\n  --text-inverse: var(--cream);\n  --text-inverse-soft: rgba(var(--cream-rgb), 0.72);\n  --text-accent: var(--burgundy);\n\n  /* semantic accents / actions */\n  --accent: var(--burgundy);\n  --accent-hover: var(--burgundy-dark);\n  --accent-on-inverse: var(--cream);\n\n  /* borders */\n  --border-subtle: rgba(var(--charcoal-rgb), 0.14);\n  --border-strong: rgba(var(--charcoal-rgb), 0.32);\n  --border-inverse: rgba(var(--cream-rgb), 0.24);\n}\n<\u002Fstyle>\n  <style>/* Svitlana Schumacher — type tokens\n   Заголовки (headlines): Playfair Display, italic, tight tracking (~-0.02em)\n   Основний текст (body): Montserrat, bold / medium / regular, tight tracking (~-0.02em)\n*/\n:root {\n  --font-display: 'Playfair Display', 'Georgia', serif;\n  --font-body: 'Montserrat', 'Helvetica Neue', Arial, sans-serif;\n\n  --tracking-display: -0.02em;\n  --tracking-body: -0.01em;\n\n  /* display / headline scale — Playfair Display italic */\n  --text-display-xl: italic 700 64px/1.05 var(--font-display);\n  --text-display-lg: italic 600 44px/1.1 var(--font-display);\n  --text-display-md: italic 600 32px/1.15 var(--font-display);\n  --text-display-sm: italic 500 24px/1.2 var(--font-display);\n\n  /* body scale — Montserrat */\n  --text-body-lg: 500 20px/1.5 var(--font-body);\n  --text-body-md: 400 16px/1.6 var(--font-body);\n  --text-body-sm: 400 14px/1.5 var(--font-body);\n  --text-caption: 600 12px/1.4 var(--font-body);\n  --text-label: 700 13px/1.3 var(--font-body); /* uppercase micro-labels, badges */\n}\n<\u002Fstyle>\n  <style>/* Svitlana Schumacher — spacing, radii, shadow, motion tokens */\n:root {\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 48px;\n  --space-8: 64px;\n  --space-9: 96px;\n\n  /* editorial brand — mostly flat, minimally rounded */\n  --radius-sm: 4px;\n  --radius-md: 10px;\n  --radius-lg: 20px;\n  --radius-pill: 999px;\n\n  --shadow-sm: 0 1px 2px rgba(var(--charcoal-rgb), 0.08);\n  --shadow-md: 0 8px 24px rgba(var(--charcoal-rgb), 0.10);\n  --shadow-inverse: 0 8px 24px rgba(0, 0, 0, 0.28);\n\n  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1); /* @kind other */\n  --duration-fast: 140ms; /* @kind other */\n  --duration-standard: 220ms; /* @kind other */\n}\n<\u002Fstyle>\n  <style>/* Webfonts — Playfair Display (headlines) + Montserrat (body).\n   Loaded from Google Fonts CDN (no custom brand font files were supplied). */\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"db9bed6a-8e91-4536-8561-1e7d15fa59ca\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"cd885562-f5bd-4ca9-9ac8-0c49d5ef7cb3\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"5d519ce2-2747-4e64-9f8d-75c0 r Display';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"cf75996f-180d-44f9-ab90-bbb1cd49b1c7\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* Svitlana Schumacher — color tokens\n   Source: Стилістика.pdf — 3 brand colors:\n   #F6F5E8 cream  — primary color for backgrounds, text plates\n   #424242 charcoal — color for text & elements\n   #7F0713 burgundy — accent color, also usable for backgrounds\n*/\n:root {\n  /* base palette */\n  --cream: #F6F5E8;\n  --cream-rgb: 246, 245, 232; /* @kind other */\n  --charcoal: #424242;\n  --charcoal-rgb: 66, 66, 66; /* @kind other */\n  --burgundy: #7F0713;\n  --burgundy-rgb: 127, 7, 19; /* @kind other */\n\n  /* derived shades (oklch-adjusted, kept in-family) */\n  --burgundy-dark: #5C050D;   /* pressed / deep accent */\n  --burgundy-light: #A32234;  /* hover tint on dark surfaces */\n  --charcoal-soft: #6E6E68;   /* secondary text on cream */\n  --charcoal-faint: #9A9A93;  /* tertiary text, placeholders */\n  --cream-dim: #EAE8D8;       /* subtle surface step-down from cream */\n  --white: #FFFFFF;\n\n  /* semantic surfaces */\n  --surface-page: var(--cream);\n  --surface-page-dim: var(--cream-dim);\n  --surface-inverse: var(--burgundy);\n  --surface-card: var(--white);\n  --surface-card-on-inverse: rgba(255, 255, 255, 0.06);\n\n  /* semantic text */\n  --text-primary: var(--charcoal);\n  --text-secondary: var(--charcoal-soft);\n  --text-tertiary: var(--charcoal-faint);\n  --text-inverse: var(--cream);\n  --text-inverse-soft: rgba(var(--cream-rgb), 0.72);\n  --text-accent: var(--burgundy);\n\n  /* semantic accents / actions */\n  --accent: var(--burgundy);\n  --accent-hover: var(--burgundy-dark);\n  --accent-on-inverse: var(--cream);\n\n  /* borders */\n  --border-subtle: rgba(var(--charcoal-rgb), 0.14);\n  --border-strong: rgba(var(--charcoal-rgb), 0.32);\n  --border-inverse: rgba(var(--cream-rgb), 0.24);\n}\n\n/* Svitlana Schumacher — type tokens\n   Заголовки (headlines): Playfair Display, italic, tight tracking (~-0.02em)\n   Основний текст (body): Montserrat, bold / medium / regular, tight tracking (~-0.02em)\n*/\n:root {\n  --font-display: 'Playfair Display', 'Georgia', serif;\n  --font-body: 'Montserrat', 'Helvetica Neue', Arial, sans-serif;\n\n  --tracking-display: -0.02em;\n  --tracking-body: -0.01em;\n\n  /* display / headline scale — Playfair Display italic */\n  --text-display-xl: italic 700 64px/1.05 var(--font-display);\n  --text-display-lg: italic 600 44px/1.1 var(--font-display);\n  --text-display-md: italic 600 32px/1.15 var(--font-display);\n  --text-display-sm: italic 500 24px/1.2 var(--font-display);\n\n  /* body scale — Montserrat */\n  --text-body-lg: 500 20px/1.5 var(--font-body);\n  --text-body-md: 400 16px/1.6 var(--font-body);\n  --text-body-sm: 400 14px/1.5 var(--font-body);\n  --text-caption: 600 12px/1.4 var(--font-body);\n  --text-label: 700 13px/1.3 var(--font-body); /* uppercase micro-labels, badges */\n}\n\n/* Svitlana Schumacher — spacing, radii, shadow, motion tokens */\n:root {\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 48px;\n  --space-8: 64px;\n  --space-9: 96px;\n\n  /* editorial brand — mostly flat, minimally rounded */\n  --radius-sm: 4px;\n  --radius-md: 10px;\n  --radius-lg: 20px;\n  --radius-pill: 999px;\n\n  --shadow-sm: 0 1px 2px rgba(var(--charcoal-rgb), 0.08);\n  --shadow-md: 0 8px 24px rgba(var(--charcoal-rgb), 0.10);\n  --shadow-inverse: 0 8px 24px rgba(0, 0, 0, 0.28);\n\n  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1); /* @kind other */\n  --duration-fast: 140ms; /* @kind other */\n  --duration-standard: 220ms; /* @kind other */\n}\n\n<\u002Fstyle>\n  <script src=\"11b6badc-ed9c-4b5b-983d-87ee023a0b3f\"><\u002Fscript>\n  <style>\n    body { margin: 0; background: var(--cream); }\n    a { color: var(--burgundy); text-decoration: none; }\n    a:hover { color: var(--burgundy-dark); }\n    * { box-sizing: border-box; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"{{S.page}}\">\n\n  <!-- top control bar -->\n  <div style=\"{{S.topbar}}\">\n    <div style=\"{{S.wordmark}}\">Target Prime<\u002Fdiv>\n    <div style=\"{{S.deviceToggle}}\">\n      <div sc-camel-on-click=\"{{setDesktop}}\" style=\"{{S.toggleBtnDesktop}}\">Desktop<\u002Fdiv>\n      <div sc-camel-on-click=\"{{setMobile}}\" style=\"{{S.toggleBtnMobile}}\">Mobile<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"{{S.frame}}\">\n\n    <!-- 1. HERO -->\n    <section data-screen-label=\"Hero\" style=\"{{S.hero}}\">\n      <div style=\"{{S.heroText}}\">\n        <x-import component-from-global-scope=\"SvitlanaSchumacherDesignSystem_9bf831.Badge\" hint-size=\"auto,28px\" tone=\"outline\">Онлайн-курс Target Prime Beginner<\u002Fx-import>\n        <h1 style=\"{{S.heroTitle}}\">Професія таргетолога з нуля — під керівництвом того, хто веде її прямо зараз<\u002Fh1>\n        <p style=\"{{S.heroSubtitle}}\">Не просто уроки в записі, а система практикуючого таргетолога, яка щодня перевіряється на реальних бюджетах<\u002Fp>\n        <x-import component-from-global-scope=\"SvitlanaSchumacherDesignSystem_9bf831.Button\" hint-size=\"auto,52px\" variant=\"primary\" style=\"{{S.heroBtn}}\" sc-camel-on-click=\"{{goTelegram}}\">Написати в Telegram<\u002Fx-import>\n        <div style=\"{{S.heroMeta}}\">10 модулів · 63 уроки · перші клієнти вже під час навчання<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"{{S.heroImageWrap}}\">\n        <x-import component-from-global-scope=\"image-slot\" from=\"eddb6d87-7d10-443c-94b6-3c387d96360c#/image-slot.js\" id=\"hero-portrait\" shape=\"rounded\" radius=\"20\" src=\"assets/portrait-studio-tie.jpg\" placeholder=\"Твоє фото\" hint-size=\"100%,100%\" style=\"{{S.heroImage}}\"><\u002Fx-import>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 2. ABOUT -->\n    <section data-screen-label=\"Про мене\" style=\"{{S.about}}\">\n      <div style=\"{{S.aboutImageWrap}}\">\n        <x-import component-from-global-scope=\"image-slot\" from=\"eddb6d87-7d10-443c-94b6-3c387d96360c#/image-slot.js\" id=\"about-portrait\" shape=\"rounded\" radius=\"20\" src=\"assets/portrait-editorial-bw.jpg\" placeholder=\"Твоє фото\" hint-size=\"100%,100%\" style=\"{{S.aboutImage}}\"><\u002Fx-import>\n      <\u002Fdiv>\n      <div style=\"{{S.aboutText}}\">\n        <x-import component-from-global-scope=\"SvitlanaSchumacherDesignSystem_9bf831.SectionHeader\" hint-size=\"auto,auto\" eyebrow=\"Наставник\" title=\"Хто буде навчати\" align=\"left\" tone=\"light\"><\u002Fx-import>\n        <p style=\"{{S.bodyText}}\">Мене звати Світлана, я на ринку таргету 4 роки. За цей час — понад 100 проєктів, серед них кейс, який приніс клієнту понад $500 000 за рік співпраці, і бюджет у $50 000 на місяць під моїм керуванням.<\u002Fp>\n        <p style=\"{{S.bodyText}}\">Але головне не в цифрах з минулого. Я досі веду в середньому 10 проєктів одночасно — просто зараз, поки ти читаєш цей текст. У мене є власна команда: 2 помічниці, асистент, монтажер, дизайнер.<\u002Fp>\n        <p style=\"{{S.bodyTextAccent}}\">Це означає одне: усе, чого я навчаю, — не архів знань трирічної давності. Це те, що працює в моїх рекламних кабінетах сьогодні.<\u002Fp>\n        <div style=\"{{S.statRow}}\">\n          <x-import component-from-global-scope=\"SvitlanaSchumacherDesignSystem_9bf831.StatBlock\" hint-size=\"auto,auto\" value=\"4 роки\" label=\"в таргеті\" tone=\"light\"><\u002Fx-import>\n          <x-import component-from-global-scope=\"SvitlanaSchumacherDesignSystem_9bf831.StatBlock\" hint-size=\"auto,auto\" value=\"100+\" label=\"проєктів\" tone=\"light\"><\u002Fx-import>\n          <x-import component-from-global-scope=\"SvitlanaSchumacherDesignSystem_9bf831.StatBlock\" hint-size=\"auto,auto\" value=\"10\" label=\"проєктів зараз\" tone=\"light\"><\u002Fx-import>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 3. PAIN POINTS (inverse) -->\n    <section data-screen-label=\"Болі аудиторії\" style=\"{{S.pain}}\">\n      <x-import component-from-global-scope=\"SvitlanaSchumacherDesignSystem_9bf831.SectionHeader\" hint-size=\"auto,auto\" title=\"Впізнаєш себе?\" align=\"center\" tone=\"dark\"><\u002Fx-import>\n      <div style=\"{{S.painList}}\">\n        <sc-for list=\"{{painPoints}}\" as=\"p\" hint-placeholder-count=\"5\">\n          <div style=\"{{S.painItem}}\">{{p}}<\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 4. КОМУ ПІДХОДИТЬ -->\n    <section data-screen-label=\"Кому підходить\" style=\"{{S.fit}}\">\n      <x-import component-from-global-scope=\"SvitlanaSchumacherDesignSystem_9bf831.SectionHeader\" hint-size=\"auto,auto\" title=\"Цей курс для тебе, якщо ти...\" align=\"center\" tone=\"light\"><\u002Fx-import>\n      <div style=\"{{S.fitGrid}}\">\n        <sc-for list=\"{{fitCards}}\" as=\"f\" hint-placeholder-count=\"3\">\n          <div style=\"{{S.fitCard}}\">\n            <div style=\"{{S.fitCardTitle}}\">{{f.title}}<\u002Fdiv>\n            <div style=\"{{S.fitCardText}}\">{{f.text}}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 5. PROGRAM -->\n    <section data-screen-label=\"Програма\" style=\"{{S.program}}\">\n      <x-import component-from-global-scope=\"SvitlanaSchumacherDesignSystem_9bf831.SectionHeader\" hint-size=\"auto,auto\" eyebrow=\"Програма\" title=\"10 модулів, 63 уроки\" subtitle=\"Від першого кроку в професію до стабільного потоку клієнтів\" align=\"left\" tone=\"light\"><\u002Fx-import>\n      <div style=\"{{S.moduleList}}\">\n        <sc-for list=\"{{modules}}\" as=\"m\" hint-placeholder-count=\"10\">\n          <div style=\"{{S.moduleRow}}\" sc-camel-on-click=\"{{toggleModule}}\" data-idx=\"{{$index}}\">\n            <div style=\"{{S.moduleHead}}\">\n              <div style=\"{{S.moduleNum}}\">{{m.numLabel}}<\u002Fdiv>\n              <div style=\"{{S.moduleTitle}}\">{{m.title}}<\u002Fdiv>\n              <div style=\"{{S.moduleLessons}}\">{{m.lessonsLabel}}<\u002Fdiv>\n              <div style=\"{{S.moduleChevron}}\">{{m.chevron}}<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{m.open}}\" hint-placeholder-val=\"{{false}}\">\n              <div style=\"{{S.moduleBody}}\">{{m.desc}}<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 6. CASES -->\n    <section data-screen-label=\"Кейси учениць\" style=\"{{S.cases}}\">\n      <x-import component-from-global-scope=\"SvitlanaSchumacherDesignSystem_9bf831.SectionHeader\" hint-size=\"auto,auto\" eyebrow=\"Соціальний доказ\" title=\"За кожною цифрою — реальна людина і реальний кабінет\" subtitle=\"Натискай на кейс — і потрапиш прямо в Instagram-пост з деталями\" align=\"left\" tone=\"light\"><\u002Fx-import>\n      <div style=\"{{S.caseGrid}}\">\n        <sc-for list=\"{{visibleCases}}\" as=\"c\" hint-placeholder-count=\"8\">\n          <a href=\"{{c.link}}\" target=\"_blank\" rel=\"noopener\" style=\"{{S.caseCard}}\">\n            <div style=\"{{S.caseCardStat}}\">{{c.stat}}<\u002Fdiv>\n            <div style=\"{{S.caseCardName}}\">{{c.name}}<\u002Fdiv>\n            <div style=\"{{S.caseCardIg}}\">Instagram ↗<\u002Fdiv>\n          <\u002Fa>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <sc-if value=\"{{hasMoreCases}}\" hint-placeholder-val=\"{{true}}\">\n        <div style=\"{{S.showMoreWrap}}\">\n          <x-import component-from-global-scope=\"SvitlanaSchumacherDesignSystem_9bf831.Button\" hint-size=\"auto,44px\" variant=\"outline\" sc-camel-on-click=\"{{toggleCases}}\">{{casesToggleLabel}}<\u002Fx-import>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsection>\n\n    <!-- repeat CTA -->\n    <div style=\"{{S.midCta}}\">\n      <x-import component-from-global-scope=\"SvitlanaSchumacherDesignSystem_9bf831.Button\" hint-size=\"auto,52px\" variant=\"primary\" sc-camel-on-click=\"{{goTelegram}}\">Написати в Telegram<\u002Fx-import>\n    <\u002Fdiv>\n\n    <!-- 7. PRICING (inverse) -->\n    <section data-screen-label=\"Тарифи\" style=\"{{S.pricing}}\">\n      <x-import component-from-global-scope=\"SvitlanaSchumacherDesignSystem_9bf831.SectionHeader\" hint-size=\"auto,auto\" title=\"Обери формат навчання\" align=\"center\" tone=\"dark\"><\u002Fx-import>\n      <div style=\"{{S.pricingGrid}}\">\n        <div style=\"{{S.priceCard}}\">\n          <div style=\"{{S.priceName}}\">Самостійний<\u002Fdiv>\n          <div style=\"{{S.priceValue}}\">$399<\u002Fdiv>\n          <div style=\"{{S.priceDesc}}\">Доступ до всіх 10 модулів і навчальних матеріалів. Проходь у своєму темпі — курс залишається доступним рік. Розрахований на 3 місяці в комфортному ритмі.<\u002Fdiv>\n          <x-import component-from-global-scope=\"SvitlanaSchumacherDesignSystem_9bf831.Button\" hint-size=\"100%,48px\" variant=\"outline\" style=\"{{S.priceBtnOutline}}\" sc-camel-on-click=\"{{goTelegram}}\">Забронювати місце<\u002Fx-import>\n        <\u002Fdiv>\n        <div style=\"{{S.priceCardFeatured}}\">\n          <x-import component-from-global-scope=\"SvitlanaSchumacherDesignSystem_9bf831.Badge\" hint-size=\"auto,26px\" tone=\"inverse\">Тільки 10 місць<\u002Fx-import>\n          <div style=\"{{S.priceNameFeatured}}\">З куратором<\u002Fdiv>\n          <div style=\"{{S.priceValueFeatured}}\">$649<\u002Fdiv>\n          <div style=\"{{S.priceDescFeatured}}\">Все з тарифу «Самостійний», плюс перевірка кожного домашнього завдання куратором, щотижневий Zoom з розбором питань і активний чат з куратором на весь курс. Темп — 2,5 місяці.<\u002Fdiv>\n          <x-import component-from-global-scope=\"SvitlanaSchumacherDesignSystem_9bf831.Button\" hint-size=\"100%,48px\" variant=\"inverse\" style=\"{{S.priceBtnInverse}}\" sc-camel-on-click=\"{{goTelegram}}\">Забронювати місце<\u002Fx-import>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"{{S.pricingFooter}}\">Старт потоку — 26.10 · Доступна оплата частинами через Monobank (до 3 платежів) · Доступ до уроків — 1 рік<\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 8. FAQ -->\n    <section data-screen-label=\"FAQ\" style=\"{{S.faq}}\">\n      <x-import component-from-global-scope=\"SvitlanaSchumacherDesignSystem_9bf831.SectionHeader\" hint-size=\"auto,auto\" title=\"Питання, які виникають найчастіше\" align=\"left\" tone=\"light\"><\u002Fx-import>\n      <div style=\"{{S.faqList}}\">\n        <sc-for list=\"{{faqItems}}\" as=\"q\" hint-placeholder-count=\"7\">\n          <div style=\"{{S.faqRow}}\" sc-camel-on-click=\"{{toggleFaq}}\" data-idx=\"{{$index}}\">\n            <div style=\"{{S.faqQ}}\">\n              <div>{{q.q}}<\u002Fdiv>\n              <div style=\"{{S.faqChevron}}\">{{q.chevron}}<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{q.open}}\" hint-placeholder-val=\"{{false}}\">\n              <div style=\"{{S.faqA}}\">{{q.a}}<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 9. FINAL CTA (inverse) -->\n    <section data-screen-label=\"Фінальний CTA\" style=\"{{S.finalCta}}\">\n      <div style=\"{{S.finalCtaBgWrap}}\">\n        <x-import component-from-global-scope=\"image-slot\" from=\"eddb6d87-7d10-443c-94b6-3c387d96360c#/image-slot.js\" id=\"cta-bg\" shape=\"rect\" src=\"assets/final-cta-portrait.jpeg\" placeholder=\"Фонове фото\" hint-size=\"100%,100%\" style=\"background: linear-gradient(180deg, #c1672a, #28211a)\"><\u002Fx-import>\n      <\u002Fdiv>\n      <div style=\"{{S.finalCtaOverlay}}\"><\u002Fdiv>\n      <div style=\"{{S.finalCtaContent}}\">\n        <x-import component-from-global-scope=\"SvitlanaSchumacherDesignSystem_9bf831.SectionHeader\" hint-size=\"auto,auto\" title=\"Хочеш опанувати одну з найбільш затребуваних онлайн професій?\" subtitle=\"Приєднуйся до курсу і виходь за 1000$ заробітку вже в перші 6 місяців роботи\" align=\"center\" tone=\"dark\"><\u002Fx-import>\n        <x-import component-from-global-scope=\"SvitlanaSchumacherDesignSystem_9bf831.Button\" hint-size=\"auto,52px\" variant=\"inverse\" sc-camel-on-click=\"{{goTelegram}}\">Написати в Telegram<\u002Fx-import>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- FOOTER -->\n    <footer style=\"{{S.footer}}\">\n      <div style=\"{{S.footerWordmark}}\">Target Prime<\u002Fdiv>\n      <div style=\"{{S.footerLinks}}\">\n        <a href=\"{{telegramUrl}}\" target=\"_blank\" rel=\"noopener\" style=\"{{S.footerLink}}\">Telegram<\u002Fa>\n        <a href=\"https://instagram.com\" target=\"_blank\" rel=\"noopener\" style=\"{{S.footerLink}}\">Instagram<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"{{S.footerLegal}}\">ФОП Шумахер Світлана Валеріївна · РНОКПП <a href=\"tel:3365002945\">3365002945<\u002Fa> · 2 група ЄП<\u002Fdiv>\n    <\u002Ffooter>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\n\nclass Component extends DCLogic {\n  state = {\n    isMobile: false,\n    showAllCases: false,\n    openModules: { 0: true, 1: true, 2: true },\n    openFaq: {}\n  };\n\n  telegramUrl = 'https://t.me/svitlana_schumacher';\n\n  painPoints = [\n    'Хочеш нову професію, але не знаєш, з чого почати',\n    'Дивилась безкоштовні уроки на YouTube, а в голові — каша замість системи',\n    'Боїшся, що без досвіду і портфоліо тебе ніхто не найме',\n    'Не розумієш, скільки реально можна заробляти і чи варто вкладати час',\n    'Мрієш працювати з будь-якої точки світу, але не знаєш, як це влаштувати технічно'\n  ];\n\n  fitCardsData = [\n    { title: 'Новачок', text: 'Хочеш освоїти нову професію з нуля за 2,5-3 місяці і почати заробляти, не маючи досвіду' },\n    { title: 'Вже щось пробувала', text: 'Проходила курси чи дивилась YouTube, але знання не склались у систему, яка дає результат' },\n    { title: 'Хочеш свободу', text: 'Мрієш працювати віддалено, самостійно обирати клієнтів і будувати графік під себе' }\n  ];\n\n  modulesData = [\n    { title: 'Точка входу', lessons: 4, desc: 'Що таке професія, як побудований курс, пошук перших клієнтів з дня 1' },\n    { title: 'Технічний старт', lessons: 4, desc: 'Бізнес-сторінка, рекламний кабінет, Бізнес-менеджер, безпечна передача доступів' },\n    { title: 'Стратегічне мислення', lessons: 9, desc: 'Аудиторії, психологія покупки, розвідка ніші, побудова стратегії' },\n    { title: 'Воронки та точки конверсії', lessons: 6, desc: 'Сайт, лід-форми, квізи, чат-боти' },\n    { title: 'Крео, що працює', lessons: 6, desc: 'Основи дизайну, Canva/Figma, відеокреативи на телефон, тексти, що продають' },\n    { title: 'Instagram таргетолога', lessons: 4, desc: 'Блог з перших днів навчання, контент, який працює на довіру' },\n    { title: 'Технічний запуск', lessons: 12, desc: 'Піксель, Conversion API, цілі, бюджет, 5 практичних запусків кампаній, нюанси ЄС/США' },\n    { title: 'Ведення та масштабування', lessons: 6, desc: 'Тестування гіпотез, аналіз, оптимізація, масштабування, звітність' },\n    { title: 'Безпека та відповідність правилам', lessons: 3, desc: 'Правила Facebook, профілактика і дії при блокуванні' },\n    { title: 'Бізнес таргетолога', lessons: 9, desc: 'Перемовини з клієнтом, бриф, заперечення, перший заробіток, довгострокові клієнти' }\n  ];\n\n  casesData = [\n    { name: 'Влада', stat: '6 000$ за навчання', link: 'https://www.instagram.com/p/DZxKSz3CI7K/', featured: true },\n    { name: 'Аня', stat: '4 400$ за навчання', link: 'https://www.instagram.com/p/DSkNP3liKLj/', featured: true },\n    { name: 'Стася', stat: 'Дохід 3 700€', link: 'https://www.instagram.com/p/DZpKdeiCKuh/', featured: true },\n    { name: 'Віка', stat: '2 800$ під час навчання', link: 'https://www.instagram.com/p/DZZVujoiGAa/', featured: true },\n    { name: 'Влада', stat: '3 200$ за навчання', link: 'https://www.instagram.com/p/DU0dADOCMFq/',
